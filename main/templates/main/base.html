<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Cake App{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lily+Script+One&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cake-pink: #ffe0e9;
            --dark-pink: #ff85a2;
            --accent-pink: #f06292;
        }

        body {
            background-color: var(--cake-pink);
            font-family: 'Poppins', sans-serif;
            color: #4a4a4a;
        }

        /* Bakery-style Navbar */
        .navbar {
            background-color: rgba(255, 255, 255, 0.9) !important;
            border-bottom: 3px solid var(--dark-pink);
        }

        .navbar-brand {
            font-family: 'Lily Script One', cursive;
            font-size: 1.8rem;
            color: var(--dark-pink) !important;
        }

        .nav-link {
            font-weight: 600;
            color: #555 !important;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--accent-pink) !important;
        }

        /* Container for the "Notebook" effect */
        .book-page {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-top: 20px;
            min-height: 70vh;
        }

        .text-pink { color: var(--dark-pink); }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body> 
    <nav class="navbar navbar-expand-lg sticky-top mb-4 shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="{% url 'main:home' %}">
            <span style="font-size: 1.5rem;">🎂</span> Cake Corner
        </a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="{% url 'main:home' %}">Home</a>
            <a class="nav-link" href="{% url 'main:flavors' %}">My Flavors</a>
            
            {% if user.is_authenticated %}
                <span class="nav-link disabled text-muted">| Hello, {{ user.username }}</span>
                <a class="nav-link" href="{% url 'admin:logout' %}">Logout</a>
            {% else %}
                <a class="nav-link" href="{% url 'admin:login' %}">Login</a>
            {% endif %}
          </div>
        </div>
      </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
