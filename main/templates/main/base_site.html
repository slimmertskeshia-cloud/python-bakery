{% extends "admin/base.html" %}

{% block extrastyle %}
<style>
    /* Targeting the Django Admin CSS Variables */
    :root {
        --primary: #d63384;           /* Your Dark Pink */
        --secondary: #f8bbd0;         /* Your Light Accent Pink */
        --accent: #bc2b73;            /* Hover Pink */
        --header-bg: #d63384;         /* Header background */
        --header-color: #ffffff;
        --breadcrumbs-bg: #fff0f5;    /* Very light pink for breadcrumbs */
        --link-color: #d63384;
    }

    #header {
        background: var(--header-bg) !important;
        color: var(--header-color) !important;
    }

    div.breadcrumbs {
        background: var(--breadcrumbs-bg) !important;
        color: var(--primary) !important;
    }

    .module h2, .module caption, .inline-group h2 {
        background: var(--secondary) !important;
        color: var(--primary) !important;
    }

    /* Change the "Add" and "Change" buttons to match your theme */
    .addlink, .changelink {
        color: var(--primary) !important;
    }

    input[type=submit].default {
        background: var(--primary) !important;
    }
</style>
{% endblock %}

{% block content %}
